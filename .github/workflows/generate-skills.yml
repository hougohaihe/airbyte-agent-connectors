# Phase 2 CI: Auto-generate skill reference docs when connector docs change.
#
# Triggers on changes to connector README/AUTH/REFERENCE files on main.
# Regenerates all skill references and opens a PR if files changed.

name: Generate Skill References

on:
  push:
    branches: [main]
    paths:
      - "connectors/**/README.md"
      - "connectors/**/AUTH.md"
      - "connectors/**/REFERENCE.md"
      - "connectors/**/pyproject.toml"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-skill-refs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Generate skill references
        run: |
          python scripts/generate_skill_references.py --all --verbose

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet skills/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          branch: auto/update-skill-refs
          commit-message: "docs: auto-update skill reference docs"
          title: "docs: auto-update skill reference docs"
          body: |
            Auto-generated by the `generate-skills` workflow.

            This PR updates the skill reference documentation in
            `skills/airbyte-agent-connectors/references/` to reflect
            the latest connector README, AUTH, and REFERENCE files.

            **Review checklist:**
            - [ ] Spot-check 2-3 connector references for accuracy
            - [ ] Verify connector-index.md lists all connectors
            - [ ] Confirm SKILL.md is <= 500 lines
          labels: documentation
          delete-branch: true
